<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Best Cars Dealership</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
        }

        /* Navbar styling */
        .navbar {
            background-color: darkturquoise;
            height: 1in; /* navbar height */
        }
        .navbar .nav-link {
            font-size: larger;
        }
        .navbar .nav-link.active {
            font-weight: bold;
            text-decoration: underline;
        }

        /* Contact card styling */
        .contact-card {
            width: 60%;
            margin: 50px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .contact-card img {
            width: 100%;
            height: 350px; /* taller image */
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .contact-card h1 {
            color: darkturquoise;
            text-align: center;
            margin-bottom: 20px;
        }

        .contact-card h2 {
            color: #333333;
            margin-top: 20px;
        }

        .contact-card p {
            font-size: 1.1rem;
            margin: 5px 0 15px 0; /* add bottom margin for spacing */
        }

        @media (max-width: 768px) {
            .contact-card {
                width: 90%;
                padding: 20px;
            }
            .contact-card img {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <h2 style="padding-right: 5%;">Dealerships</h2>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                    aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" style="font-size: larger;" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <div class="contact-card">
        <img src="/static/showroom.jpg" alt="Showroom Image">
        <h1>Contact Us</h1>

        <div class="contact-info">
            <h2>Phone</h2>
            <p>07978 407081</p>

            <h2>Email</h2>
            <p>test@email.com</p>

            <h2>Address</h2>
            <p>123 Dealership Street</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
